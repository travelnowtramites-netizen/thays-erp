<!-- Master_lists.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Thays-Postres - Listas Maestras</title>
    <link rel="stylesheet" href="../assets/style/module_pages/Master_lists.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
         
</head>

<body>

    <div class="main-container">
        <header class="header">
            <div class="title-section">
                <i class="fas fa-database"></i>
                <h1>Panel Configuración | Listas maestras</h1>
            </div>
            <button class="btn-back" onclick="window.history.back()"><i class="fa-solid fa-chevron-left"></i>
                Regresar</button>

        </header>

        <div class="content-card">
            <h2 class="subtitle">LISTAS DE ESTADOS Y CATEGORÍAS</h2>

            <div class="modules-grid">
                <button class="module-btn active" onclick="loadModule('LST_UNIDADES_MEDIDA', this)">
                    <i class="fas fa-balance-scale"></i>
                    <span>UNIDAD MEDIDA</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_TIPO_GASTO', this)">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>TIPOS GASTO</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_ESTADOS_PRODUCCION', this)">
                    <i class="fas fa-tasks"></i>
                    <span>ESTADOS PROD.</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_ESTADOS_INVENTARIO', this)">
                    <i class="fas fa-warehouse"></i>
                    <span>ESTADOS INV.</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_SABORES', this)">
                    <i class="fas fa-ice-cream"></i>
                    <span>SABORES</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_PRESENTACIONES', this)">
                    <i class="fas fa-box-open"></i>
                    <span>PRESENTACIONES</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
                <button class="module-btn" onclick="loadModule('LST_TIPO_PRODUCTO', this)">
                    <i class="fas fa-bread-slice"></i>
                    <span>TIPOS PRODUCTO</span>
                    <div class="status-indicator">Cargando...</div>
                </button>
            </div>

            <hr class="divider">

            <div class="table-header">
                <h3 id="current-table-title">Cargando...</h3>
                <button class="btn-agregar" onclick="openModal('add')">
                    <i class="fas fa-plus-circle"></i> Agregar Nuevo
                </button>
            </div>

            <div class="table-container">
                <table id="master-table">
                    <thead>
                        <tr id="table-head"></tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td style="text-align:center;">Seleccione un módulo para ver los datos.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Registro</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <form id="dynamicForm">
                <div id="formInputs">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancelar" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-guardar">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>


   
    <script src="../assets/script/module_pages/master_lists.js"></script>
    <script src="../assets/script/app_boot.js"></script>
</body>

</html>
